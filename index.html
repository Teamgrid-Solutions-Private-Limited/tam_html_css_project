<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="https://use.typekit.net/byh4wcl.css" />
    <link rel="stylesheet" href="./assets/css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>TAM Group - Där historia möter framtid</title>
    
   
</head>
<body>

    <!-- Main Wrapper: 1724px max-width -->
    <div class="main-wrapper">

        <!-- HEADER -->
        <header class="site-header">
            <!-- Inner Container: 1559px max-width -->
            <div class="container header-inner">
                <a href="/" class="logo">tam</a>
                
                <nav class="main-nav">
                    <a href="#">TJÄNSTER</a>
                    <a href="#">PROJEKT</a>
                    <a href="#">HÅLLBARHET</a>
                    <a href="#" class="active">METOD</a> <!-- Marked active based on design -->
                    <a href="#">KONTAKT</a>
                </nav>

                <div class="lang-switch">
                    <a href="#" class="active">SWE</a> / <a href="#">ENG</a>
                </div>
            </div>
        </header>

        <!-- HERO MODULE -->
        <!-- Can be image or video. Using an img tag here with object-fit cover -->
        <section class="hero-module">
            <!-- Placeholder image resembling a European street facade -->
            <img src="https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?ixlib=rb-4.0.3&auto=format&fit=crop&w=2560&q=80" alt="Historical Building Background" class="hero-media">
            <div class="hero-overlay"></div>
            
            <div class="container hero-content">
                <h1 class="hero-title">Där historia<br>möter framtid</h1>
            </div>
        </section>

        <!-- TESTIMONIAL TITLE MODULE -->
        <!-- Background color can be overridden dynamically using inline style: style="--module-bg-color: #e0f7fa;" -->
        <section class="testimonial-module">
            <div class="container testimonial-inner">
                <h2 class="testimonial-text">“Spaces of light, clarity, and connection, shaped with intention.”</h2>
                
                <div class="testimonial-author">
                    <!-- Name linked to email as requested -->
                    <a href="mailto:andreas.philipson@tamgroup.se" class="author-name">Andreas Philipson</a>
                    <span class="author-separator">|</span>
                    <span class="author-title">Partner & Senior Rådgivare</span>
                </div>
            </div>
        </section>

    </div>

</body>
</html>
